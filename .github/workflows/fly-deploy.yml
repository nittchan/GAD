# Fly.io deployment pipeline
#
# dev branch      → no auto-deploy (local development only)
# staging branch  → deploys to gad-dashboard-staging.fly.dev
# main branch     → deploys to parametricdata.io (production)

name: Deploy

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy-staging:
    name: Deploy to staging
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    concurrency: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app gad-dashboard-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}

  deploy-production:
    name: Deploy to production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: deploy-production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app gad-dashboard
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

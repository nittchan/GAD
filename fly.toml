# fly.toml — parametricdata.io dashboard
# Deploy: fly deploy

app = 'gad-dashboard'
primary_region = 'bom'

[build]
  dockerfile = 'dashboard/Dockerfile'

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# fly.toml — parametricdata.io dashboard + API
# Deploy: fly deploy

app = 'gad-dashboard'
primary_region = 'bom'

[build]
  dockerfile = 'dashboard/Dockerfile'

# Streamlit dashboard on port 8501 (primary)
[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

# API on port 8502 (internal — accessed via /v1/ path rewrite if needed)
[[services]]
  internal_port = 8502
  protocol = "tcp"
  [[services.ports]]
    port = 8502

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
